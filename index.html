<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anonymous Chat & Flappy Bird</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none; /* Запрещаем скролл во время игры */
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- ИНТЕРФЕЙС ЧАТА --- */
        h2 { text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: var(--tg-theme-hint-color, #aaaaaa); text-align: center; margin-bottom: 15px; }
        
        textarea {
            width: 100%; height: 120px; padding: 15px;
            border: 2px solid transparent; border-radius: 16px; box-sizing: border-box;
            font-size: 16px; resize: none;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2c);
            color: var(--tg-theme-text-color, #ffffff);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        textarea:focus { outline: none; border-color: var(--tg-theme-button-color, #2481cc); }

        .btn {
            display: block; width: 100%; padding: 16px; margin-top: 15px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 16px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-secondary {
            background: transparent; border: 2px solid var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-color, #2481cc); margin-top: 10px;
        }

        /* --- ИГРА FLAPPY BIRD --- */
        #gameArea {
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }
        canvas {
            background: #70c5ce; /* Цвет неба */
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            height: 400px;
        }
    </style>
</head>
<body>

    <div id="chatView" class="container active">
        <h2 id="mainTitle">🔒 Анонимный чат</h2>
        <div id="subtitle" class="subtitle">Пиши сообщение, я отвечу как смогу</div>
        <textarea id="msgInput" placeholder="Введи текст сообщения..."></textarea>
        <button class="btn" onclick="sendMessage()">✈️ Отправить</button>
        <button class="btn btn-secondary" id="gameBtn" onclick="switchTab('gameView'); startGame();">🎮 Скучно? Сыграй в Flappy Bird!</button>
    </div>

    <div id="gameView" class="container">
        <h2>🐦 Flappy Bird</h2>
        <div class="subtitle">Тапай по экрану, чтобы лететь</div>
        <div id="gameArea">
            <canvas id="gameCanvas" width="320" height="400"></canvas>
        </div>
        <button class="btn btn-secondary" style="margin-top: 20px;" onclick="switchTab('chatView')">🔙 Вернуться в чат</button>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ САЙТА
        // ==========================================
        const TOKEN = '8696824591:AAEkMp-xGZMp9LcPlieCvrudF0e2wUB2VRY'; 
        const MY_ID = 6504410659; // Твой ID

        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const replyTo = urlParams.get('reply_to');

        if (replyTo) {
            document.getElementById('mainTitle').innerText = "💬 Ответ пользователю";
            document.getElementById('subtitle').innerText = "ID: " + replyTo;
            document.getElementById('msgInput').placeholder = "Введите текст ответа...";
            document.getElementById('gameBtn').style.display = 'none';
        }

        function switchTab(tabId) {
            document.getElementById('chatView').classList.remove('active');
            document.getElementById('gameView').classList.remove('active');
            document.getElementById(tabId).classList.add('active');
        }

        // ==========================================
        // ОТПРАВКА СООБЩЕНИЯ
        // ==========================================
        function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if (!text) return alert("Введите текст");

            const btn = document.querySelector('.btn');
            btn.innerText = "⏳ Отправка...";
            
            let targetChatId = replyTo ? replyTo : MY_ID;
            let finalMsg = replyTo ? text : `👤 ID: ${tg.initDataUnsafe?.user?.id || "Неизвестно"}\n📱 [Через App]: ${text}`;

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: targetChatId, text: finalMsg })
            }).then(r => r.ok ? tg.close() : alert("Ошибка!")).catch(() => alert("Ошибка сети"));
        }

        // ==========================================
        // ДВИЖОК FLAPPY BIRD
        // ==========================================
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let frames = 0, score = 0, best = 0;
        let bird, pipes, gameState; // 0 = старт, 1 = игра, 2 = проигрыш

        function resetGame() {
            bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.25, jump: -4.6, speed: 0 };
            pipes = [];
            score = 0;
            frames = 0;
            gameState = 0; // Ждем клика
        }

        canvas.addEventListener("pointerdown", () => {
            if (gameState === 0) { gameState = 1; } // Начинаем игру
            if (gameState === 1) { 
                bird.speed = bird.jump; 
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
            }
            if (gameState === 2) { resetGame(); } // Рестарт
        });

        function updateGame() {
            if (gameState === 1) {
                bird.speed += bird.gravity;
                bird.y += bird.speed;

                // Трубы
                if (frames % 100 === 0) {
                    let pipeY = Math.random() * (canvas.height - 200) + 50; // дырка
                    pipes.push({ x: canvas.width, y: pipeY, w: 40, gap: 110 });
                }

                for (let i = 0; i < pipes.length; i++) {
                    let p = pipes[i];
                    p.x -= 2;

                    // Столкновение
                    if (bird.x < p.x + p.w && bird.x + bird.width > p.x &&
                        (bird.y < p.y || bird.y + bird.height > p.y + p.gap)) {
                        gameState = 2; // Проигрыш
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    }
                    
                    // Очки
                    if (p.x === bird.x) score++;
                }
                pipes = pipes.filter(p => p.x + p.w > 0); // Удаляем трубы за экраном

                // Упал на землю
                if (bird.y + bird.height >= canvas.height || bird.y < 0) {
                    gameState = 2;
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
            }
            if (gameState === 2 && score > best) best = score;
            frames++;
        }

        function drawGame() {
            ctx.fillStyle = "#70c5ce"; // Небо
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Трубы
            ctx.fillStyle = "#2ecc71"; // Зеленые трубы
            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                ctx.fillRect(p.x, 0, p.w, p.y); // Верхняя
                ctx.fillRect(p.x, p.y + p.gap, p.w, canvas.height - p.y - p.gap); // Нижняя
            }

            // Птичка (желтый квадратик для простоты)
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

            // Очки
            ctx.fillStyle = "#fff";
            ctx.font = "35px Arial";
            ctx.fillText(score, canvas.width / 2 - 10, 50);

            // Тексты состояний
            if (gameState === 0) {
                ctx.font = "20px Arial";
                ctx.fillText("Тапни чтобы начать", 70, canvas.height / 2);
            } else if (gameState === 2) {
                ctx.font = "25px Arial";
                ctx.fillStyle = "red";
                ctx.fillText("ИГРА ОКОНЧЕНА", 50, canvas.height / 2 - 20);
                ctx.fillStyle = "#fff";
                ctx.font = "20px Arial";
                ctx.fillText("Счет: " + score + " | Лучший: " + best, 60, canvas.height / 2 + 20);
                ctx.fillText("Тапни для рестарта", 70, canvas.height / 2 + 50);
            }
        }

        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (!bird) { resetGame(); gameLoop(); }
        }
    </script>
</body>
</html>
