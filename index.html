<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        .screen {
            width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; padding-top: 20px;
            animation: fadeIn 0.3s ease-out; box-sizing: border-box;
        }
        .active { display: flex; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1, h2 { margin: 10px 0; text-align: center; }
        
        /* КНОПКИ И МЕНЮ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; margin-top: 20px; }
        .game-card {
            background: var(--tg-theme-secondary-bg-color, #2c2c2c);
            border-radius: 16px; padding: 20px 10px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s;
        }
        .game-card:active { transform: scale(0.95); }
        .game-icon { font-size: 40px; margin-bottom: 10px; }
        .game-title { font-size: 16px; font-weight: bold; color: var(--tg-theme-text-color, #fff); }

        .btn-back {
            background: var(--tg-theme-button-color, #2481cc); color: #fff;
            border: none; border-radius: 12px; padding: 12px 20px; font-size: 16px;
            margin-top: 15px; cursor: pointer; width: 90%; max-width: 300px;
        }

        /* ИГРОВЫЕ ЗОНЫ */
        canvas { background: #000; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .score-board { font-size: 20px; font-weight: bold; margin-bottom: 10px; }

        /* УПРАВЛЕНИЕ ЗМЕЙКОЙ */
        .d-pad { display: grid; grid-template-columns: 60px 60px 60px; gap: 5px; margin-top: 15px; justify-content: center; }
        .d-btn { background: #333; border: none; border-radius: 10px; height: 60px; font-size: 24px; color: #fff; }
        .d-btn:active { background: #555; }
        .d-up { grid-column: 2; } .d-left { grid-column: 1; } .d-right { grid-column: 3; } .d-down { grid-column: 2; }

        /* ПАМЯТЬ (КАРТОЧКИ) */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; max-width: 320px; }
        .card {
            background: var(--tg-theme-button-color, #2481cc); height: 70px; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer;
            transition: transform 0.2s;
        }
        .card.flipped { background: #fff; transform: rotateY(180deg); }
        .card.matched { background: #2ecc71; opacity: 0.8; }

        /* КЛИКЕР */
        .coin-btn {
            font-size: 100px; background: none; border: none; margin-top: 50px; cursor: pointer; transition: transform 0.05s;
        }
        .coin-btn:active { transform: scale(0.85); }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <h1>🕹️ Игровой Зал</h1>
        <p>Выбери игру, чтобы убить время</p>
        <div class="menu-grid">
            <div class="game-card" onclick="openGame('flappy')"><div class="game-icon">🐦</div><div class="game-title">Flappy Bird</div></div>
            <div class="game-card" onclick="openGame('snake')"><div class="game-icon">🐍</div><div class="game-title">Змейка</div></div>
            <div class="game-card" onclick="openGame('memory')"><div class="game-icon">🃏</div><div class="game-title">Найди пару</div></div>
            <div class="game-card" onclick="openGame('clicker')"><div class="game-icon">💰</div><div class="game-title">Тапалка</div></div>
        </div>
    </div>

    <div id="flappy" class="screen">
        <h2>Flappy Bird</h2>
        <div class="score-board">Счет: <span id="flapScore">0</span></div>
        <canvas id="flapCanvas" width="300" height="400" onclick="flapJump()"></canvas>
        <button class="btn-back" onclick="closeGame()">🔙 В меню</button>
    </div>

    <div id="snake" class="screen">
        <h2>Змейка</h2>
        <div class="score-board">Счет: <span id="snakeScore">0</span></div>
        <canvas id="snakeCanvas" width="300" height="300"></canvas>
        <div class="d-pad">
            <button class="d-btn d-up" onclick="changeDir(0, -1)">⬆️</button>
            <button class="d-btn d-left" onclick="changeDir(-1, 0)">⬅️</button>
            <button class="d-btn d-right" onclick="changeDir(1, 0)">➡️</button>
            <button class="d-btn d-down" onclick="changeDir(0, 1)">⬇️</button>
        </div>
        <button class="btn-back" onclick="closeGame()">🔙 В меню</button>
    </div>

    <div id="memory" class="screen">
        <h2>Найди пару</h2>
        <div class="score-board">Ходов: <span id="memScore">0</span></div>
        <div class="memory-grid" id="memGrid"></div>
        <button class="btn-back" onclick="closeGame()">🔙 В меню</button>
    </div>

    <div id="clicker" class="screen">
        <h2>Тапалка</h2>
        <div class="score-board" style="font-size: 30px; margin-top: 20px;">Монет: <span id="clickScore">0</span></div>
        <button class="coin-btn" onclick="addCoin()">🪙</button>
        <button class="btn-back" style="margin-top: auto; margin-bottom: 30px;" onclick="closeGame()">🔙 В меню</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let activeLoop = null; // Для остановки анимаций

        // НАВИГАЦИЯ
        function openGame(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'flappy') initFlappy();
            if(id === 'snake') initSnake();
            if(id === 'memory') initMemory();
        }
        function closeGame() {
            cancelAnimationFrame(activeLoop);
            clearInterval(activeLoop);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menu').classList.add('active');
        }
        function vibe() { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }
        function vibeError() { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); }

        // --- FLAPPY BIRD ---
        let fCtx, fBird, fPipes, fFrames, fScore;
        function initFlappy() {
            const cvs = document.getElementById("flapCanvas");
            fCtx = cvs.getContext("2d");
            fBird = { x: 50, y: 150, v: 0, g: 0.3, jump: -5 };
            fPipes = []; fFrames = 0; fScore = 0;
            document.getElementById('flapScore').innerText = 0;
            cancelAnimationFrame(activeLoop);
            flapLoop();
        }
        function flapJump() { fBird.v = fBird.jump; vibe(); }
        function flapLoop() {
            fBird.v += fBird.g; fBird.y += fBird.v;
            if(fFrames % 100 === 0) fPipes.push({x: 300, y: Math.random() * -200, w: 40, gap: 120});
            
            fCtx.fillStyle = "#70c5ce"; fCtx.fillRect(0,0,300,400); // Фон
            fCtx.fillStyle = "#f1c40f"; fCtx.fillRect(fBird.x, fBird.y, 20, 20); // Птица
            
            fCtx.fillStyle = "#2ecc71";
            for(let i=0; i<fPipes.length; i++) {
                let p = fPipes[i]; p.x -= 2;
                fCtx.fillRect(p.x, p.y, p.w, 300); // Верхняя (очень длинная, скрыта верхом)
                fCtx.fillRect(p.x, p.y + 300 + p.gap, p.w, 400); // Нижняя
                
                if(p.x === fBird.x) { fScore++; document.getElementById('flapScore').innerText = fScore; }
                // Столкновение
                if(fBird.x < p.x+p.w && fBird.x+20 > p.x && (fBird.y < p.y+300 || fBird.y+20 > p.y+300+p.gap)) return fDie();
            }
            if(fBird.y > 400 || fBird.y < 0) return fDie();
            fPipes = fPipes.filter(p => p.x > -40);
            fFrames++;
            activeLoop = requestAnimationFrame(flapLoop);
        }
        function fDie() { vibeError(); setTimeout(initFlappy, 1000); }

        // --- ЗМЕЙКА ---
        let sCtx, sSnake, sFood, sDx, sDy, sScore;
        function initSnake() {
            const cvs = document.getElementById("snakeCanvas");
            sCtx = cvs.getContext("2d");
            sSnake = [{x: 10, y: 10}]; sDx = 1; sDy = 0; sScore = 0;
            spawnFood();
            document.getElementById('snakeScore').innerText = 0;
            clearInterval(activeLoop);
            activeLoop = setInterval(snakeLoop, 150);
        }
        function spawnFood() { sFood = {x: Math.floor(Math.random()*15), y: Math.floor(Math.random()*15)}; }
        function changeDir(x, y) { if(sDx === -x && sDy === -y) return; sDx = x; sDy = y; vibe(); }
        function snakeLoop() {
            let head = {x: sSnake[0].x + sDx, y: sSnake[0].y + sDy};
            // Столкновение со стеной или собой
            if(head.x < 0 || head.x >= 15 || head.y < 0 || head.y >= 15 || sSnake.some(s => s.x===head.x && s.y===head.y)) return sDie();
            
            sSnake.unshift(head);
            if(head.x === sFood.x && head.y === sFood.y) {
                sScore += 10; document.getElementById('snakeScore').innerText = sScore; spawnFood(); vibe();
            } else { sSnake.pop(); }

            sCtx.fillStyle = "#111"; sCtx.fillRect(0,0,300,300);
            sCtx.fillStyle = "red"; sCtx.fillRect(sFood.x*20, sFood.y*20, 18, 18);
            sCtx.fillStyle = "lime"; sSnake.forEach(s => sCtx.fillRect(s.x*20, s.y*20, 18, 18));
        }
        function sDie() { vibeError(); clearInterval(activeLoop); setTimeout(initSnake, 1000); }

        // --- ПАМЯТЬ ---
        const icons = ['🍎','🍌','🍉','🍇','🍓','🥑','🥕','🌽'];
        let mCards = [], mFlipped = [], mScore = 0, mMatches = 0;
        function initMemory() {
            let deck = [...icons, ...icons].sort(() => Math.random() - 0.5);
            const grid = document.getElementById('memGrid');
            grid.innerHTML = ''; mScore = 0; mMatches = 0; mFlipped = [];
            document.getElementById('memScore').innerText = 0;
            
            deck.forEach((icon, i) => {
                let card = document.createElement('div');
                card.className = 'card'; card.dataset.icon = icon; card.dataset.index = i;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }
        function flipCard(card) {
            if(mFlipped.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped'); card.innerText = card.dataset.icon; mFlipped.push(card); vibe();
            
            if(mFlipped.length === 2) {
                mScore++; document.getElementById('memScore').innerText = mScore;
                if(mFlipped[0].dataset.icon === mFlipped[1].dataset.icon) {
                    mFlipped.forEach(c => { c.classList.add('matched'); c.style.background = '#2ecc71'; });
                    mMatches++; mFlipped = [];
                    if(mMatches === 8) { vibe(); setTimeout(() => alert(`Победа! Ходов: ${mScore}`), 500); }
                } else {
                    setTimeout(() => { mFlipped.forEach(c => { c.classList.remove('flipped'); c.innerText = ''; }); mFlipped = []; }, 800);
                }
            }
        }

        // --- ТАПАЛКА ---
        let cScore = 0;
        function addCoin() {
            cScore++; document.getElementById('clickScore').innerText = cScore; vibe();
        }
    </script>
</body>
</html>
