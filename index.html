<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat & Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ И ЦВЕТА TELEGRAM */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* КОНТЕЙНЕРЫ (ЧАТ И ИГРА) */
        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
            display: none; /* Скрыто по умолчанию */
        }
        .active {
            display: block; /* Показываем активный блок */
        }

        /* ЭЛЕМЕНТЫ ЧАТА */
        h2 { text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: var(--tg-theme-hint-color, #aaaaaa); text-align: center; margin-bottom: 20px; }
        
        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            border: 2px solid transparent;
            border-radius: 16px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2c);
            color: var(--tg-theme-text-color, #ffffff);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: border 0.3s;
        }
        textarea:focus { outline: none; border: 2px solid var(--tg-theme-button-color, #2481cc); }

        /* КНОПКИ */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: linear-gradient(135deg, var(--tg-theme-button-color, #2481cc), #1c66a6);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s, opacity 0.3s;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-color, #2481cc);
            margin-top: 10px;
        }

        /* МИНИ-ИГРА (ТАПАЛКА) */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .score { font-size: 32px; font-weight: bold; margin-bottom: 30px; }
        .coin {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ffd700, #daa520);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 10px 30px rgba(218, 165, 32, 0.5);
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
        }
        .coin:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="chatView" class="container active">
        <h2 id="mainTitle">🔒 Анонимный чат</h2>
        <div id="subtitle" class="subtitle">Пиши сообщение, я отвечу как смогу</div>
        
        <textarea id="msgInput" placeholder="Введи текст сообщения..."></textarea>
        <button class="btn" onclick="sendMessage()">✈️ Отправить</button>
        <button class="btn btn-secondary" id="gameBtn" onclick="switchTab('gameView')">🎮 Скучно ждать? Поиграй!</button>
    </div>

    <div id="gameView" class="container">
        <h2>🎮 Убиваем время</h2>
        <div class="subtitle">Кликай, пока ждешь ответа</div>
        
        <div class="game-area">
            <div class="score" id="scoreDisplay">0</div>
            <div class="coin" onclick="tapCoin()">💰</div>
        </div>
        
        <button class="btn btn-secondary" style="margin-top: 50px;" onclick="switchTab('chatView')">🔙 Вернуться в чат</button>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ САЙТА (ВСТАВЬ ДАННЫЕ СЮДА)
        // ==========================================
        const TOKEN = '8696824591:AAEkMp-xGZMp9LcPlieCvrudF0e2wUB2VRY'; 
        const MY_ID = 6504410659; // Твой личный цифровой ID

        const tg = window.Telegram.WebApp;
        tg.expand();

        // Проверка: открыл ли это админ (ты) для ответа?
        const urlParams = new URLSearchParams(window.location.search);
        const replyTo = urlParams.get('reply_to');

        if (replyTo) {
            document.getElementById('mainTitle').innerText = "💬 Ответ пользователю";
            document.getElementById('subtitle').innerText = "ID: " + replyTo;
            document.getElementById('msgInput').placeholder = "Введите текст ответа...";
            document.getElementById('gameBtn').style.display = 'none'; // Скрываем игру для тебя
        }

        // ПЕРЕКЛЮЧЕНИЕ ВСТАВОК (Чат <-> Игра)
        function switchTab(tabId) {
            document.getElementById('chatView').classList.remove('active');
            document.getElementById('gameView').classList.remove('active');
            document.getElementById(tabId).classList.add('active');
        }

        // ЛОГИКА МИНИ-ИГРЫ
        let score = 0;
        function tapCoin() {
            score++;
            document.getElementById('scoreDisplay').innerText = score;
            // Добавляем вибрацию при клике, если телефон поддерживает
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // ОТПРАВКА СООБЩЕНИЯ
        function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if (text === "") {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                alert("Введите текст сообщения");
                return;
            }

            // Добавляем красивую анимацию на кнопку при отправке
            const btn = document.querySelector('.btn');
            btn.innerText = "⏳ Отправка...";
            btn.style.opacity = "0.7";

            let targetChatId = replyTo ? replyTo : MY_ID;
            let finalMessageText;

            if (replyTo) {
                finalMessageText = text;
            } else {
                const senderId = tg.initDataUnsafe?.user?.id || "Неизвестно";
                finalMessageText = `👤 ID: ${senderId}\n📱 [Через App]: ${text}`;
            }

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: targetChatId, text: finalMessageText })
            })
            .then(response => {
                if (response.ok) {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    tg.close(); 
                } else {
                    alert("Ошибка отправки.");
                    btn.innerText = "✈️ Отправить";
                    btn.style.opacity = "1";
                }
            })
            .catch(err => {
                alert("Ошибка сети: " + err);
                btn.innerText = "✈️ Отправить";
                btn.style.opacity = "1";
            });
        }
    </script>
</body>
</html>
