<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn:active {
            opacity: 0.8;
        }
        .hint {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>🔒 Анонимный чат</h2>
        <textarea id="msgInput" placeholder="Напиши что-нибудь сюда..."></textarea>
        <button class="btn" onclick="sendMessage()">Отправить анонимно</button>
        <div class="hint">Твой профиль и никнейм останутся скрыты</div>
    </div>

    <script>
        // Инициализируем WebApp Телеграма
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно на весь экран телефона

        function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if (text === "") {
                alert("Введите текст сообщения");
                return;
            }

            // Магия: отправляем данные обратно в наш Python-бот
            tg.sendData(text);
            
            // Закрываем мини-приложение после отправки
            tg.close();
        }
    </script>
</body>
</html>
